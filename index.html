<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyMuse Piano</title>
    <meta name="description" content="A premium web piano app. Play, record, and learn piano using your keyboard.">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Particle Background -->
    <canvas id="particle-bg"></canvas>

    <!-- Audio Context Overlay (hidden by default - audio starts on first interaction) -->
    <div id="audio-overlay" class="hidden"></div>

    <!-- App Container -->
    <div id="app">

        <!-- Top Toolbar Ribbon -->
        <header class="toolbar-ribbon glass-panel">
            <!-- Logo -->
            <div class="toolbar-logo">
                <h1 class="logo">KeyMuse <span>Piano</span></h1>
            </div>

            <!-- Note Display Badge -->
            <div class="toolbar-note-badge">
                <span id="current-note">&mdash;</span>
                <span id="sustain-indicator" class="sustain-indicator">SUSTAIN</span>
            </div>

            <!-- Hamburger Toggle (mobile only) -->
            <button id="toolbar-hamburger" class="toolbar-btn toolbar-hamburger" aria-label="Toggle controls" aria-expanded="false">
                <svg class="hamburger-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
                <svg class="close-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>

            <!-- Controls Group -->
            <div class="toolbar-controls">
                <!-- Instrument Dropdown -->
                <div class="toolbar-dropdown">
                    <button class="toolbar-btn dropdown-trigger" id="instrument-dropdown-btn" aria-haspopup="true" aria-expanded="false">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                        <span class="toolbar-btn-label" id="instrument-label">Piano</span>
                        <svg class="dropdown-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="dropdown-menu" id="instrument-menu">
                        <button class="dropdown-item active" data-value="piano">Piano</button>
                        <button class="dropdown-item" data-value="electric">Electric</button>
                        <button class="dropdown-item" data-value="organ">Organ</button>
                        <button class="dropdown-item" data-value="synth">Synth</button>
                        <button class="dropdown-item" data-value="warm">Warm</button>
                        <button class="dropdown-item" data-value="bell">Bell</button>
                    </div>
                </div>

                <!-- Volume Control -->
                <div class="toolbar-volume">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>
                    <input type="range" id="volume-slider" min="0" max="100" value="75">
                    <span id="volume-value">75%</span>
                </div>

                <!-- Octave Controls -->
                <div class="toolbar-octave">
                    <button id="octave-down" class="toolbar-btn toolbar-btn-sm" aria-label="Octave down">&minus;</button>
                    <span id="octave-display" class="octave-badge">4</span>
                    <button id="octave-up" class="toolbar-btn toolbar-btn-sm" aria-label="Octave up">+</button>
                </div>

                <!-- Effects -->
                <div class="toolbar-effects">
                    <button id="reverb-btn" class="toolbar-btn toolbar-btn-icon" aria-label="Toggle reverb" title="Reverb">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12h4l3-9 4 18 3-9h4"/>
                        </svg>
                    </button>
                    <button id="delay-btn" class="toolbar-btn toolbar-btn-icon" aria-label="Toggle delay" title="Delay">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </button>
                </div>

                <!-- Divider -->
                <div class="toolbar-divider"></div>

                <!-- Recording Controls -->
                <div class="toolbar-recording">
                    <button id="record-btn" class="toolbar-btn toolbar-btn-record" aria-label="Record">
                        <span class="record-dot"></span>
                    </button>
                    <button id="play-btn" class="toolbar-btn toolbar-btn-icon" disabled aria-label="Play recording">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </button>
                    <button id="clear-btn" class="toolbar-btn toolbar-btn-icon" disabled aria-label="Clear recording">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                    <span id="recording-indicator" class="recording-indicator hidden">REC</span>
                </div>
            </div>

            <!-- Learn Button (Right Side) -->
            <button id="learn-toggle-btn" class="toolbar-btn toolbar-btn-learn" aria-label="Open Learn Mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                <span>Learn</span>
            </button>
        </header>

        <!-- Main Piano Area -->
        <main class="main-content">
            <!-- Note Prompt Strip (for Learn Mode) -->
            <div id="note-prompt-strip" class="note-prompt-strip hidden">
                <div class="prompt-song-title">
                    <span id="learn-song-title">Select a song</span>
                    <button id="exit-learn-btn" class="prompt-exit-btn" aria-label="Exit Learn Mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="prompt-notes">
                    <div id="prompt-keys" class="prompt-keys">
                        <!-- Filled by JS: upcoming keys to press -->
                    </div>
                </div>
                <div class="prompt-progress">
                    <div class="progress-bar">
                        <div id="learn-progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="learn-progress-text">0%</span>
                </div>
            </div>

            <div class="piano-container">
                <div class="piano-stage">
                    <div class="piano-roll-container">
                        <canvas id="piano-roll"></canvas>
                    </div>
                    <div id="piano" class="piano" role="application" aria-label="Piano keyboard">
                        <!-- Keys generated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Learn Panel (Right Side) -->
        <aside id="learn-panel" class="learn-panel glass-panel">
            <div class="learn-panel-header">
                <h2>Learn Songs</h2>
                <button id="learn-panel-close" class="panel-close-btn" aria-label="Close panel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="learn-panel-content">
                <!-- Difficulty Filter -->
                <div class="learn-filters">
                    <button class="filter-btn active" data-difficulty="all">All</button>
                    <button class="filter-btn" data-difficulty="beginner">Beginner</button>
                    <button class="filter-btn" data-difficulty="intermediate">Intermediate</button>
                </div>
                <!-- Song List -->
                <ul id="song-list" class="song-list">
                    <!-- Populated by JavaScript -->
                </ul>
                <!-- Key Guide Toggle -->
                <div class="learn-panel-footer">
                    <button id="key-guide-toggle" class="key-guide-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Key Guide
                    </button>
                </div>
            </div>
            <!-- Key Guide Drawer -->
            <div id="key-guide-drawer" class="key-guide-drawer">
                <div class="key-guide-content">
                    <h3>Keyboard Mapping</h3>
                    <div class="key-guide-grid">
                        <div class="key-row white-keys">
                            <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd><kbd>G</kbd><kbd>H</kbd><kbd>J</kbd><kbd>K</kbd>
                        </div>
                        <div class="key-row note-labels">
                            <span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>A</span><span>B</span><span>C</span>
                        </div>
                        <div class="key-row black-keys">
                            <kbd>W</kbd><kbd>E</kbd><span></span><kbd>T</kbd><kbd>Y</kbd><kbd>U</kbd>
                        </div>
                        <div class="key-row note-labels black-labels">
                            <span>C#</span><span>D#</span><span></span><span>F#</span><span>G#</span><span>A#</span>
                        </div>
                    </div>
                    <p class="key-guide-tip"><kbd>Space</kbd> = Sustain &nbsp;&nbsp; <kbd>Z</kbd>/<kbd>X</kbd> = Octave</p>
                </div>
            </div>
        </aside>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with <a href="https://tonejs.github.io/" target="_blank" rel="noopener">Tone.js</a> &middot; KeyMuse Piano</p>
        </footer>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.0.4/Tone.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="unmute.js"></script>
    <script src="script.js"></script>
</body>
</html>
